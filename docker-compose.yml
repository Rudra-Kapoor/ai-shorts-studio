# Local all-in-one stack for AI Shorts Studio.
#
# Brings up everything the app needs on your machine so you don't have to create
# cloud accounts: MongoDB (DB), MinIO (S3 storage in place of Cloudflare R2),
# Redis + a serverless-redis-http shim (the Upstash REST API the code expects),
# and the FFmpeg worker. The Next.js web app runs on the host (`npm run dev`).
#
#   docker compose up -d --build      # start everything
#   docker compose logs -f worker     # watch the pipeline
#   docker compose down               # stop (add -v to wipe data)
#
# Secrets (your Groq/Gemini keys) live in worker/.env.worker.local.

name: ai-shorts-studio

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  # S3-compatible object storage standing in for Cloudflare R2.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: localminio
      MINIO_ROOT_PASSWORD: localminio123
      # Let the browser PUT/GET directly via presigned URLs.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"   # S3 API (browser + web + worker)
      - "9001:9001"   # MinIO web console (http://localhost:9001)
    volumes:
      - minio_data:/data

  # Create the bucket once MinIO is reachable, then exit.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 localminio localminio123; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/ai-shorts;
      echo 'bucket ai-shorts ready';
      "

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # Speaks the Upstash REST API in front of plain Redis, so both the web app
  # (@upstash/redis) and the worker talk to it unchanged.
  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    restart: unless-stopped
    environment:
      SRH_MODE: env
      SRH_TOKEN: localdevtoken
      SRH_CONNECTION_STRING: "redis://redis:6379"
    ports:
      - "8079:80"
    depends_on:
      - redis

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./worker/.env.worker.local
    # Mount the source so local code edits only need `docker compose restart
    # worker` (no image rebuild). yt-dlp etc. live in the image's site-packages,
    # which the mount doesn't touch. Cloud (render.yaml) doesn't use this.
    volumes:
      - ./worker:/app
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      serverless-redis-http:
        condition: service_started

volumes:
  mongo_data:
  minio_data:
  redis_data:
